{% extends 'base.html' %}
{% block content %}
<div class="container py-5" style="max-width: 460px;">
    <div class="text-center mb-4 fade-in-up">
        <div class="hero-kicker mb-2">Premium sneaker auctions</div>
        <h1 class="section-title mb-2">SIGN IN</h1>
        <p class="text-muted mb-0">Enter the market, watch the bids, win the pair.</p>
    </div>

    <div class="card p-4 p-md-5 fade-in-up" style="animation-delay: 0.08s;">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Sign In</button>
        </form>

        <hr class="my-4">
        <div class="text-center small text-muted">
            Demo accounts: alice/password, bob_kicks/password, admin/admin123
        </div>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.register') }}" class="text-decoration-none fw-semibold">Create an account</a>
        </div>
    </div>
</div>
{% endblock %}
