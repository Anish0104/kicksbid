{% extends 'base.html' %}
{% block content %}
<div class="container py-5" style="max-width: 460px;">
    <div class="text-center mb-4 fade-in-up">
        <div class="hero-kicker mb-2">Join the marketplace</div>
        <h1 class="section-title mb-2">REGISTER</h1>
        <p class="text-muted mb-0">Create an account to bid, sell, and follow sneakers.</p>
    </div>

    <div class="card p-4 p-md-5 fade-in-up" style="animation-delay: 0.08s;">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Create Account</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-semibold">Already have an account? Sign in</a>
        </div>
    </div>
</div>
{% endblock %}
